name: Publish OXWU ARM64 image

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/dfmmjzrz2h-cyber/oxwu

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract official ARM64 AppImage payload
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends squashfs-tools
          curl -fsSL https://eew.earthquake.tw/releases/linux/arm64/oxwu-linux-arm64.AppImage \
            -o "$RUNNER_TEMP/oxwu-linux-arm64.AppImage"
          printf '%s  %s\n' \
            '30f25abc9be15aef03defa241b031e697427c5e5e7d9c331eaebd31aa030c17d' \
            "$RUNNER_TEMP/oxwu-linux-arm64.AppImage" | sha256sum --check -
          unsquashfs -offset 197808 -d oxwu/oxwu-extracted \
            "$RUNNER_TEMP/oxwu-linux-arm64.AppImage"

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: ./oxwu
          file: ./oxwu/Dockerfile
          platforms: linux/arm64
          build-args: |
            TARGETARCH=arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:1.0.8-autorun
            ${{ env.IMAGE_NAME }}:latest-arm64
